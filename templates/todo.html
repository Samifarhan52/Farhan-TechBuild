{% extends 'base.html' %}

{% block content %}

<section class="hero">

<div class="app-container">

    <h1>To-Do App</h1>

    <input
        type="text"
        id="taskInput"
        placeholder="Enter task..."
    >

    <button class="btn" onclick="addTask()">
        Add Task
    </button>

    <ul id="taskList"></ul>

</div>

</section>

<script>

function addTask(){

    const taskInput =
    document.getElementById('taskInput');

    const taskText =
    taskInput.value;

    if(taskText === '') return;

    const li =
    document.createElement('li');

    li.innerHTML =
    `${taskText}
    <button onclick="removeTask(this)">
    Delete
    </button>`;

    document.getElementById('taskList')
    .appendChild(li);

    taskInput.value = '';
}

function removeTask(button){

    button.parentElement.remove();
}

</script>

{% endblock %}
